name: Keep Render Alive (Infinite Chain)

on:
  workflow_dispatch:

jobs:
  ping-render:
    name: Ping Render API Health Endpoint
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.MY_PAT_TOKEN }}" ]; then
            echo "::error::MY_PAT_TOKEN secret topilmadi! Iltimos, GitHub repository secrets'ga qo'shing."
            exit 1
          fi

      - name: Run Infinite Loop for 5h 55m
        run: |
          # Sizning shaxsiy Render URL manzilingiz
          HEALTH_URL="https://seven-oy-crm-backned-1.onrender.com"
          
          start_time=$(date +%s)
          max_duration=21300 # 5 soat 55 minut (soniyalarda)
          
          echo "🚀 Render'ni uyg'oq ushlash zanjiri boshlandi..."

          while true; do
            current_time=$(date +%s)
            elapsed=$(( current_time - start_time ))

            if [ $elapsed -ge $max_duration ]; then
              echo "⏳ 5 soat 55 minut tugadi. Navbatdagi zanjirga o'tamiz."
              break
            fi

            echo "==================================="
            echo "📅 Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "🌐 Target URL: ${HEALTH_URL}"
            echo "==================================="

            # Loyihangizni ping qilish
            HTTP_RESPONSE=$(curl -sS \
              --max-time 15 \
              --connect-timeout 10 \
              -o /tmp/render-health-response.json \
              -w "%{http_code}" \
              -H "User-Agent: GitHubActions-KeepAlive/1.0" \
              "${HEALTH_URL}" 2>&1)

            CURL_EXIT_CODE=$?
            echo "📊 HTTP Status Code: ${HTTP_RESPONSE}"
            echo "🔚 Curl Exit Code: ${CURL_EXIT_CODE}"

            if [ $CURL_EXIT_CODE -eq 0 ] && [ "$HTTP_RESPONSE" = "200" ]; then
              echo "::notice::✅ Health check passed! Server uyg'oq."
            else
              echo "::warning::⚠️ Ping muvaffaqiyatsiz bo'ldi (yoki server hali yuklanmoqda), lekin sikl davom etadi..."
            fi

            # Har 5 daqiqada (300 soniya) bitta ping jo'natish
            sleep 300
          done

      - name: Trigger Next Chain Link
        if: always() # Har qanday holatda ham (xatolik bo'lsa ham) zanjir uzilmasligi shart
        run: |
          echo "🔄 Keyingi workflow chaqirilmoqda..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.MY_PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/keep_render_alive.yml/dispatches \
            -d '{"ref":"'${{ github.ref_name }}'"}'
          echo "✅ Keyingi zanjir muvaffaqiyatli zaryadlandi."